openapi: 3.0.3
info:
  title: Product Management API
  description: RESTful API for managing products — generated via OpenAPI Generator (python-flask)
  version: 1.0.0
  contact:
    email: support@example.com

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: products
    description: Product CRUD operations

paths:
  /api/products:
    get:
      tags: [products]
      summary: List products
      description: Paginated list with optional filter and full-text search
      operationId: get_products
      x-openapi-router-controller: openapi_server.controllers.product_controller
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
          example: 1
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
          example: 10
        - name: sort
          in: query
          description: "Field and direction, e.g. price:asc or name:desc"
          schema: { type: string, default: "created_at:desc" }
          example: price:asc
        - name: category
          in: query
          schema:
            type: string
            enum: [Electronics, Clothing, Books, Food, Sports]
          example: Electronics
        - name: is_active
          in: query
          schema: { type: boolean }
          example: true
        - name: search
          in: query
          description: Case-insensitive search on product name
          schema: { type: string }
          example: laptop
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductListResponse' }
              example:
                success: true
                data:
                  products:
                    - id: "64a7b2c3d4e5f6789012345a"
                      name: Gaming Laptop
                      description: High-performance gaming laptop
                      price: 1299.99
                      category: Electronics
                      stock: 50
                      image_url: "https://example.com/laptop.jpg"
                      is_active: true
                      created_at: "2024-01-15T10:00:00Z"
                      updated_at: "2024-01-15T10:00:00Z"
                  pagination:
                    total: 1
                    page: 1
                    limit: 10
                    total_pages: 1
        "500":
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [products]
      summary: Create product
      operationId: create_product
      x-openapi-router-controller: openapi_server.controllers.product_controller
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
            example:
              name: Gaming Laptop
              description: High-performance laptop with RTX 4080
              price: 1299.99
              category: Electronics
              stock: 50
              image_url: "https://example.com/laptop.jpg"
              is_active: true
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        "400":
          $ref: '#/components/responses/BadRequest'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /api/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: MongoDB ObjectId (24-char hex)
        schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' }
        example: "64a7b2c3d4e5f6789012345a"

    get:
      tags: [products]
      summary: Get product by ID
      operationId: get_product_by_id
      x-openapi-router-controller: openapi_server.controllers.product_controller
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [products]
      summary: Full product replacement
      operationId: replace_product
      x-openapi-router-controller: openapi_server.controllers.product_controller
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
      responses:
        "200":
          description: Product replaced
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [products]
      summary: Partial product update
      operationId: update_product
      x-openapi-router-controller: openapi_server.controllers.product_controller
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductUpdate' }
            example:
              price: 999.99
              stock: 100
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [products]
      summary: Delete product
      operationId: delete_product
      x-openapi-router-controller: openapi_server.controllers.product_controller
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Product deleted successfully" }
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          readOnly: true
          example: "64a7b2c3d4e5f6789012345a"
        name:
          type: string
          minLength: 2
          maxLength: 200
          example: "Gaming Laptop"
        description:
          type: string
          example: "High-performance gaming laptop"
        price:
          type: number
          format: float
          minimum: 0
          example: 1299.99
        category:
          type: string
          enum: [Electronics, Clothing, Books, Food, Sports]
          example: Electronics
        stock:
          type: integer
          minimum: 0
          default: 0
          example: 50
        image_url:
          type: string
          format: uri
          example: "https://example.com/laptop.jpg"
        is_active:
          type: boolean
          default: true
          example: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T12:00:00Z"

    ProductCreate:
      type: object
      required: [name, price, category]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
          example: "Gaming Laptop"
        description:
          type: string
          example: "High-performance gaming laptop"
        price:
          type: number
          format: float
          minimum: 0
          example: 1299.99
        category:
          type: string
          enum: [Electronics, Clothing, Books, Food, Sports]
          example: Electronics
        stock:
          type: integer
          minimum: 0
          default: 0
          example: 50
        image_url:
          type: string
          format: uri
          example: "https://example.com/laptop.jpg"
        is_active:
          type: boolean
          default: true
          example: true

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        description:
          type: string
        price:
          type: number
          format: float
          minimum: 0
        category:
          type: string
          enum: [Electronics, Clothing, Books, Food, Sports]
        stock:
          type: integer
          minimum: 0
        image_url:
          type: string
          format: uri
        is_active:
          type: boolean

    ProductResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/Product'

    ProductListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            products:
              type: array
              items: { $ref: '#/components/schemas/Product' }
            pagination:
              type: object
              properties:
                total: { type: integer, example: 42 }
                page: { type: integer, example: 1 }
                limit: { type: integer, example: 10 }
                total_pages: { type: integer, example: 5 }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Error message" }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            success: false
            message: "Validation failed"
            errors:
              - field: name
                message: "Name must be at least 2 characters"
    NotFound:
      description: Product not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            success: false
            message: "Product not found"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            success: false
            message: "Internal server error"
