language: python
python:
  - "3.11"

services:
  - mongodb

before_install:
  - sudo apt-get install -y mongodb

install:
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install -r test-requirements.txt

script:
  - pytest openapi_server/test --cov=openapi_server -v

after_success:
  - coverage report
