version: "3.8"

services:
  # ── API server ──────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: product_api
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/product_db
      FLASK_ENV: development
      PORT: "8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: product_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Seed (chạy riêng: docker compose --profile seed run seed) ───────────────
  seed:
    build: .
    container_name: product_seed
    command: python seed/seed.py
    environment:
      MONGODB_URI: mongodb://mongodb:27017/product_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app_network
    profiles: [seed]

networks:
  app_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
